name: test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e . pytest
      - run: python -m pytest
      - run: python scripts/generate_demo.py
      - run: python scripts/verify_readme_assets.py
      - run: collabctl privacy-scan --json
