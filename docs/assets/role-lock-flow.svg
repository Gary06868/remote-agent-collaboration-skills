<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="460" viewBox="0 0 1040 460" role="img" aria-label="One thread one role flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F0FDFA"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="126%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1040" height="460" rx="26" fill="url(#bg)"/>
  <text x="52" y="62" fill="#0F172A" font-size="32" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">One Codex Thread, One Role</text>
  <text x="52" y="94" fill="#475569" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif">The first explicit Skill binds the session. Later calls to the opposite role are denied.</text>
  <g transform="translate(64 172)" filter="url(#shadow)">
    <rect width="190" height="96" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="30" y="42" fill="#0F172A" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">Unbound</text>
    <text x="30" y="70" fill="#64748B" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">new thread</text>
  </g>
  <g transform="translate(382 120)" filter="url(#shadow)">
    <rect width="220" height="96" rx="18" fill="#ECFDF5" stroke="#14B8A6" stroke-width="2"/>
    <text x="30" y="42" fill="#134E4A" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">lead_active</text>
    <text x="30" y="70" fill="#0F766E" font-size="14" font-family="Consolas, monospace">$team-lead-collaboration</text>
  </g>
  <g transform="translate(382 268)" filter="url(#shadow)">
    <rect width="220" height="96" rx="18" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2"/>
    <text x="30" y="42" fill="#1E3A8A" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">member_active</text>
    <text x="30" y="70" fill="#2563EB" font-size="14" font-family="Consolas, monospace">$team-member-collaboration</text>
  </g>
  <g transform="translate(744 194)" filter="url(#shadow)">
    <rect width="230" height="112" rx="18" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
    <text x="30" y="43" fill="#7C2D12" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">Conflict denied</text>
    <text x="30" y="72" fill="#9A3412" font-size="14" font-family="Consolas, monospace">ROLE_SESSION_CONFLICT</text>
    <text x="30" y="94" fill="#9A3412" font-size="14" font-family="Consolas, monospace">SESSION_CONTEXT_MISSING</text>
  </g>
  <path d="M254 205c54-42 74-48 120-48" stroke="#14B8A6" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M254 238c54 44 74 48 120 82" stroke="#60A5FA" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M602 168c82 0 96 42 132 73" stroke="#FB923C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M602 316c82 0 96-42 132-73" stroke="#FB923C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M356 138l22 18-28 9M356 340l22-18-28-9M716 228l24 14-26 13M716 256l24-14-26-13" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(128 344)">
    <rect width="188" height="42" rx="12" fill="#0F172A"/>
    <text x="20" y="27" fill="#ECFDF5" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">New thread can choose differently</text>
  </g>
</svg>
