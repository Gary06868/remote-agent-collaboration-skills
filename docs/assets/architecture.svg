<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-label="Remote Agent Collaboration architecture diagram">
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="card" x="-8%" y="-8%" width="116%" height="126%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1040" height="520" rx="26" fill="url(#surface)"/>
  <text x="52" y="64" fill="#0F172A" font-size="32" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">Architecture</text>
  <text x="52" y="96" fill="#475569" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif">Skills shape behavior, hooks pass session context, collabctl enforces the protocol.</text>
  <g transform="translate(58 148)" filter="url(#card)">
    <rect width="250" height="156" rx="18" fill="#FFFFFF"/>
    <rect x="24" y="24" width="52" height="52" rx="14" fill="#CCFBF1"/>
    <path d="M38 51h24M50 39v24" stroke="#0F766E" stroke-width="5" stroke-linecap="round"/>
    <text x="24" y="102" fill="#0F172A" font-size="22" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">Two explicit Skills</text>
    <text x="24" y="130" fill="#475569" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">lead or member, never both</text>
  </g>
  <g transform="translate(394 148)" filter="url(#card)">
    <rect width="250" height="156" rx="18" fill="#FFFFFF"/>
    <rect x="24" y="24" width="52" height="52" rx="14" fill="#DBEAFE"/>
    <path d="M39 50l8 8 18-25" fill="none" stroke="#2563EB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="24" y="102" fill="#0F172A" font-size="22" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">Trusted hooks</text>
    <text x="24" y="130" fill="#475569" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">session_id, prompt, tool input</text>
  </g>
  <g transform="translate(730 148)" filter="url(#card)">
    <rect width="250" height="156" rx="18" fill="#FFFFFF"/>
    <rect x="24" y="24" width="52" height="52" rx="14" fill="#FFEDD5"/>
    <path d="M37 42h26M37 54h26M37 66h18" stroke="#EA580C" stroke-width="5" stroke-linecap="round"/>
    <text x="24" y="102" fill="#0F172A" font-size="22" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">collabctl CLI</text>
    <text x="24" y="130" fill="#475569" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">authoritative, fail closed</text>
  </g>
  <path d="M318 226h66M654 226h66" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
  <path d="M366 210l20 16-20 16M702 210l20 16-20 16" fill="none" stroke="#94A3B8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(150 362)" filter="url(#card)">
    <rect width="740" height="90" rx="20" fill="#0F172A"/>
    <text x="30" y="38" fill="#ECFDF5" font-size="21" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">Repository protocol state</text>
    <text x="30" y="66" fill="#CBD5E1" font-size="15" font-family="Consolas, monospace">.collaboration/tasks · announcements · logs · handoffs · .collaboration-local/sessions</text>
    <rect x="608" y="26" width="92" height="38" rx="12" fill="#14B8A6"/>
    <text x="628" y="50" fill="#042F2E" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">JSONL</text>
  </g>
</svg>
