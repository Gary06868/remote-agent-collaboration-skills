  <text x="158" y="73" fill="#ECFDF5" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Real collabctl fixture: role lock, announcements, tasks, log compaction</text>
  <rect x="880" y="54" width="230" height="24" rx="12" fill="#CCFBF1"/>
  <text x="900" y="72" fill="#134E4A" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">generated by scripts/generate_demo.py</text>
  <text x="54" y="150" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace">Created task task-1.</text><text x="54" y="174" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace"></text><text x="54" y="198" fill="#FDE68A" font-size="15" font-family="Consolas, monospace">$ collabctl task accept --session-id thread-member --task-id task-1</text><text x="54" y="222" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace">Task task-1 -&gt; accepted.</text><text x="54" y="246" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace"></text><text x="54" y="270" fill="#FDE68A" font-size="15" font-family="Consolas, monospace">$ collabctl task start --session-id thread-member --task-id task-1</text><text x="54" y="294" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace">Task task-1 -&gt; in_progress.</text><text x="54" y="318" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace"></text><text x="54" y="342" fill="#FDE68A" font-size="15" font-family="Consolas, monospace">$ collabctl log append --session-id thread-member --module-id docs --task-id task-1 --summary Updated-doc</text><text x="54" y="366" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace">Log appended.</text><text x="54" y="390" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace"></text><text x="54" y="414" fill="#FDE68A" font-size="15" font-family="Consolas, monospace">$ collabctl request create --session-id thread-member --request-id req-compact --type log_compaction --su</text><text x="54" y="438" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace">Created request req-compact.</text><text x="54" y="462" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace"></text><text x="54" y="486" fill="#FDE68A" font-size="15" font-family="Consolas, monospace">$ collabctl log compact --session-id thread-member --module-id docs</text><text x="54" y="510" fill="#FCA5A5" font-size="15" font-family="Consolas, monospace">ROLE_NOT_AUTHORIZED: Role member cannot perform this operation.</text><text x="54" y="534" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace"></text><text x="54" y="558" fill="#FDE68A" font-size="15" font-family="Consolas, monospace">$ collabctl log compact --session-id thread-lead --module-id docs</text><text x="54" y="582" fill="#86EFAC" font-size="15" font-family="Consolas, monospace">Log compacted.</text><text x="54" y="606" fill="#F8FAFC" font-size="15" font-family="Consolas, monospace"></text><text x="54" y="630" fill="#FDE68A" font-size="15" font-family="Consolas, monospace">$ verify archive sha256</text><text x="54" y="654" fill="#86EFAC" font-size="15" font-family="Consolas, monospace">OK manifest archive_sha256: a94c99815814b7991c1a1e9d28125e3687e4601d788f2c6d10647b5054b4a514</text><text x="54" y="678" fill="#86EFAC" font-size="15" font-family="Consolas, monospace">OK recalculated sha256: a94c99815814b7991c1a1e9d28125e3687e4601d788f2c6d10647b5054b4a514</text><text x="54" y="702" fill="#86EFAC" font-size="15" font-family="Consolas, monospace">OK match: True</text>
