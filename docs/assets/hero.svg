<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Remote Agent Collaboration hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.45" stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <rect x="58" y="48" width="1084" height="424" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="88" y="78" width="530" height="364" rx="22" fill="url(#panel)"/>
  <rect x="116" y="108" width="112" height="28" rx="14" fill="#CCFBF1"/>
  <text x="136" y="128" fill="#134E4A" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Codex Skills</text>
  <text x="116" y="185" fill="#F8FAFC" font-size="42" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">Run a small AI team</text>
  <text x="116" y="232" fill="#F8FAFC" font-size="42" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">without losing the thread.</text>
  <text x="118" y="280" fill="#CBD5E1" font-size="22" font-family="Inter, Segoe UI, Arial, sans-serif">Lead coordinates. Members work modules.</text>
  <text x="118" y="314" fill="#CBD5E1" font-size="22" font-family="Inter, Segoe UI, Arial, sans-serif">collabctl records tasks, logs, handoffs, and reviews.</text>
  <g transform="translate(116 356)">
    <rect width="206" height="46" rx="12" fill="#14B8A6"/>
    <text x="22" y="29" fill="#042F2E" font-size="16" font-family="Consolas, monospace" font-weight="700">$team-lead</text>
    <rect x="224" width="238" height="46" rx="12" fill="#60A5FA"/>
    <text x="246" y="29" fill="#0F172A" font-size="16" font-family="Consolas, monospace" font-weight="700">$team-member</text>
  </g>
  <g transform="translate(690 94)">
    <rect x="0" y="0" width="360" height="74" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="22" y="20" width="34" height="34" rx="9" fill="#14B8A6"/>
    <path d="M31 39l6 6 14-18" fill="none" stroke="#042F2E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="76" y="32" fill="#0F172A" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">Lead thread</text>
    <text x="76" y="56" fill="#475569" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">announcements, review, compaction</text>
    <rect x="0" y="116" width="360" height="74" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="22" y="136" width="34" height="34" rx="9" fill="#60A5FA"/>
    <path d="M31 153h17M39 145v17" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <text x="76" y="148" fill="#0F172A" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">Member thread</text>
    <text x="76" y="172" fill="#475569" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">assigned tasks, module logs, requests</text>
    <rect x="0" y="232" width="360" height="74" rx="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
    <rect x="22" y="252" width="34" height="34" rx="9" fill="#F97316"/>
    <path d="M30 260l18 18M48 260l-18 18" stroke="#7C2D12" stroke-width="4" stroke-linecap="round"/>
    <text x="76" y="264" fill="#7C2D12" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750">Opposite role denied</text>
    <text x="76" y="288" fill="#9A3412" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">fail closed when session context is missing</text>
  </g>
  <path d="M650 132h38M650 248h38M650 364h38" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M674 120l16 12-16 12M674 236l16 12-16 12M674 352l16 12-16 12" fill="none" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
